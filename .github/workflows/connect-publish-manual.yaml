name: "Connect Publish (manual)"
on:
  workflow_dispatch:
    inputs:
      namespace:
        required: true
        type: string
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
jobs:
  connect-publish:
    name: "Connect Publish: ${{ inputs.namespace }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update manifest.json
        run: node update_manifest.js

      - name: Publish Connect content
        uses: rstudio/actions/connect-publish@main
        env:
          CONNECT_ENV_SET_AZ_STORAGE_CONTAINER_RESULTS: ${{ secrets.AZ_STORAGE_CONTAINER_RESULTS }}
          CONNECT_ENV_SET_AZ_STORAGE_CONTAINER_SUPPORT: ${{ secrets.AZ_STORAGE_CONTAINER_SUPPORT }}
          CONNECT_ENV_SET_AZ_STORAGE_EP: ${{ secrets.AZ_STORAGE_EP }}
          CONNECT_ENV_SET_NHP_ENCRYPT_KEY: ${{ secrets.NHP_ENCRYPT_KEY }}
          CONNECT_ENV_SET_FEEDBACK_FORM_URL: ${{ secrets.FEEDBACK_FORM_URL }}
          CONNECT_ENV_SET_GOLEM_CONFIG_ACTIVE: "production"
        with:
          url: ${{ secrets.RSCONNECT_URL }}
          api-key: ${{ secrets.RSCONNECT_API_KEY }}
          access-type: logged_in
          force: true
          dir: .:scenario_comparison
          namespace: ${{ inputs.namespace }}
